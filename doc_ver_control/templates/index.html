{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Documents</h2>
            <div>
                <a href="{{ url_for('new_doc') }}" class="btn btn-outline-primary shadow-sm me-2">
                    Create New
                </a>
                <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#uploadModal">
                    Upload Document
                </button>
            </div>
        </div>
        {% if documents %}
            <div class="list-group">
                {% for doc in documents %}
                    <a href="{{ url_for('view_doc', id=doc['id']) }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-1 fw-bold">{{ doc['title'] }}</h5>
                            <small class="text-muted">Last updated: {{ doc['last_updated'] }}</small>
                        </div>
                    </a>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info border-0 rounded">
                No documents found. Create one.
            </div>
        {% endif %}
    </div>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content border-0 shadow">
      <form action="{{ url_for('upload_doc') }}" method="POST" enctype="multipart/form-data">
          <div class="modal-header bg-body-tertiary">
            <h5 class="modal-title fw-bold">Upload a Document</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-4">
                <label for="file" class="form-label fw-bold">Select Plain Text File (.txt, .md, etc.)</label>
                <input class="form-control" type="file" id="file" name="file" required accept=".txt,.md,.csv,.json">
            </div>
            <div class="mb-2">
                <label for="title" class="form-label fw-bold">Custom Document Title</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="(Optional) Defaults to filename">
            </div>
          </div>
          <div class="modal-footer bg-body-tertiary">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary px-4">Upload and Track</button>
          </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
