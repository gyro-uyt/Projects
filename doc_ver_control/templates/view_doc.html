{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="col-12 mb-3">
        <a href="{{ url_for('index') }}" class="btn btn-sm btn-outline-secondary">&larr; Back to Home</a>
    </div>
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>{{ doc['title'] }}</h2>
            <div>
                <a href="{{ url_for('edit_doc', id=doc['id']) }}" class="btn btn-outline-primary">Edit Latest</a>
                <a href="{{ url_for('history', id=doc['id']) }}" class="btn btn-outline-secondary">History</a>
                <a href="{{ url_for('merge_view', id=doc['id']) }}" class="btn btn-outline-info">Merge Tools</a>
            </div>
        </div>

        {% if rev %}
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white border-bottom d-flex justify-content-between">
                    <span>Version: <strong>{{ rev['version_number'] }}</strong></span>
                    <span class="text-muted">{{ rev['timestamp'] }}</span>
                </div>
                <div class="card-body">
                    <pre class="mb-0" style="white-space: pre-wrap; font-family: inherit;">{{ rev['content'] }}</pre>
                </div>
            </div>
        {% else %}
            <div class="alert alert-warning">No revisions found for this document.</div>
        {% endif %}
    </div>
</div>
{% endblock %}
