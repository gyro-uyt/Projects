<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document VCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .diff-delete { background-color: #f8d7da; color: #842029; }
        .diff-insert { background-color: #d1e7dd; color: #0f5132; }
        
        .timer-svg {
            position: absolute; top: 15px; right: 14px;
            width: 32px; height: 32px;
            transform: rotateY(180deg); /* Start perfectly at 12 o'clock */
            z-index: 1; pointer-events: none; 
        }
        .timer-circle {
            fill: none; stroke: rgba(0,0,0,0.25); stroke-width: 3;
            stroke-dasharray: 100, 100; stroke-dashoffset: 0;
            animation: countdown 5s linear forwards;
        }
        @keyframes countdown {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: 100; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">DocVCS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/doc/new">New Document</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} fade show toast-alert shadow-sm pe-5" role="alert">
                    {{ message }}
                    <svg class="timer-svg" viewBox="0 0 36 36">
                        <path class="timer-circle"
                          d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                    </svg>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto-dismiss logic for the toast alerts matching the 5s CSS animation
    document.addEventListener("DOMContentLoaded", function() {
        const alerts = document.querySelectorAll('.toast-alert');
        alerts.forEach(alertEl => {
            setTimeout(() => {
                const bsAlert = new bootstrap.Alert(alertEl);
                bsAlert.close();
            }, 5000); 
        });
    });
</script>
</body>
</html>
