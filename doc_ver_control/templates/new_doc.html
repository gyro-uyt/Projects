{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom">
                <h4 class="mb-0">Create New Document</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Document Title</label>
                        <input type="text" class="form-control" id="title" name="title" required placeholder="Enter a descriptive title">
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label fw-bold">Document Content</label>
                        <textarea class="form-control font-monospace" id="content" name="content" rows="12" placeholder="Start typing your new document..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="commit_message" class="form-label fw-bold text-muted">Summary of Changes</label>
                        <input type="text" class="form-control bg-light" id="commit_message" name="commit_message" placeholder="e.g., Initial draft" value="Initial draft">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Publish Document</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
